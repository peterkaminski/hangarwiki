# Local development: Forgejo instance for testing
# Usage: docker compose up -d
# Forgejo UI: http://localhost:3000
# First run: create an admin user and generate an API token

services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:9
    container_name: hangarwiki-forgejo
    environment:
      - USER_UID=1000
      - USER_GID=1000
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - forgejo-data:/data
    restart: unless-stopped

volumes:
  forgejo-data:
